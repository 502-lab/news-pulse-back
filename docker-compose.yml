services:
  postgres:
    image: postgres:17
    container_name: newscurator-postgres
    environment:
      POSTGRES_DB: newscurator
      POSTGRES_USER: newscurator
      POSTGRES_PASSWORD: newscurator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: newscurator-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
