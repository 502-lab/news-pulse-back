name: Deploy to EC2
on:
  workflow_dispatch:               # 수동 트리거 (Secrets·Nginx 준비 후 첫 배포용)
  # push: { branches: [main] }     # 안정화 후 이 줄 주석 해제 → main 푸시 시 자동 배포
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '25' }
      - run: chmod +x gradlew && ./gradlew clean bootJar
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv -f /home/ubuntu/app/*.jar /home/ubuntu/app/news-pulse-back.jar
            cd /home/ubuntu/app
            pm2 reload newsift-back || pm2 start ecosystem.config.js
            pm2 save
