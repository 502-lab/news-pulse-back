name: Sync OpenAPI Spec

on:
  push:
    branches: [dev, main]

jobs:
  sync-openapi:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate OpenAPI spec
        run: ./gradlew test --tests "com.newscurator.integration.OpenApiSpecExportTest" --no-daemon

      - name: Push spec to news-pulse-spec
        env:
          SPEC_REPO_TOKEN: ${{ secrets.SPEC_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${SPEC_REPO_TOKEN}@github.com/502-lab/news-pulse-spec spec-repo

          mkdir -p spec-repo/api-contract
          cp build/openapi.yaml spec-repo/api-contract/openapi.yaml

          cd spec-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add api-contract/openapi.yaml

          # 변경 없으면 커밋 생략
          git diff --staged --quiet && echo "No spec changes" && exit 0

          SHORT_SHA="${GITHUB_SHA::7}"
          git commit -m "chore: sync openapi spec from news-pulse-back@${SHORT_SHA}"
          git push
