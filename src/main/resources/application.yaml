spring:
  application:
    name: news-curator
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      admin-email: ${ADMIN_EMAIL:admin@newscurator.local}
      admin-password-hash: ${ADMIN_PASSWORD_HASH:PLACEHOLDER_SET_IN_ENV}
  security:
    user:
      name: disabled
      password: disabled

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:default-test-secret-change-in-prod-minimum-32-chars!!}
  access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
  refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}

email-service:
  base-url: ${EMAIL_SERVICE_BASE_URL:https://api.resend.com}
  api-key: ${EMAIL_SERVICE_API_KEY:test-api-key}
  from-address: ${EMAIL_FROM_ADDRESS:unconfigured@example.invalid}

cors:
  allowed-origins:
    - http://localhost:5173
    - https://dev.newsit.app
    - https://newsit.app

oauth:
  allowed-redirect-uris:
    - http://localhost:3000
    - http://localhost:5173
    - https://dev.newsit.app
    - https://newsit.app
  kakao:
    client-id: ${KAKAO_CLIENT_ID:test-kakao-id}
    client-secret: ${KAKAO_CLIENT_SECRET:test-kakao-secret}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000}
    token-base-url: ${KAKAO_TOKEN_BASE_URL:https://kauth.kakao.com}
    api-base-url: ${KAKAO_API_BASE_URL:https://kapi.kakao.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID:test-google-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:test-google-secret}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000}
    token-base-url: ${GOOGLE_TOKEN_BASE_URL:https://oauth2.googleapis.com}
  apple:
    client-id: ${APPLE_CLIENT_ID:test-apple-id}
    team-id: ${APPLE_TEAM_ID:test-team}
    key-id: ${APPLE_KEY_ID:test-key-id}
    private-key: ${APPLE_PRIVATE_KEY:}
    redirect-uri: ${APPLE_REDIRECT_URI:http://localhost:3000}
    token-base-url: ${APPLE_TOKEN_BASE_URL:https://appleid.apple.com}

app:
  client:
    gemini:
      api-key: ${GEMINI_API_KEY:test-gemini-key}
      model: gemini-2.0-flash
      base-url: https://generativelanguage.googleapis.com
    naver:
      client-id: ${NAVER_CLIENT_ID:test-naver-id}
      client-secret: ${NAVER_CLIENT_SECRET:test-naver-secret}
      base-url: https://openapi.naver.com
  scheduler:
    enabled: true
    collection:
      interval-ms: 900000         # 15분
      batch-size: 50
    ai:
      interval-ms: 60000          # 1분
    bias:
      interval-ms: 60000          # 편향 분석 배치 주기 (1분)
      batch-size: 10              # 배치당 claim 건수
      recovery-interval-ms: 3600000   # one-shot 복구 폴 주기 (1시간)
      backoff-attempt1-minutes: 5     # 1회 실패 후 재시도 딜레이
      backoff-attempt2-minutes: 30    # 2회 실패 후 재시도 딜레이
      lease-minutes: 5            # claim 후 PROCESSING 점유 lease (크래시 stuck 회수 기준)
    notification:
      outbox-batch-size: 50
      outbox-interval-ms: 10000
      expiry-cron: "0 0 3 * * *"
  ai:
    batch-size: 5
    retry-limit: 3
    delay-between-calls-ms: 4500   # free tier 15 RPM 기준 ≈13 RPM, 여유 확보
    deep-retry:
      cooldown-minutes: 60
      limit: 5
  feed:
    default-page-size: 20
    max-page-size: 100
    ranking:
      category-match-score: 50
      keyword-match-score: 30
      recency-window-hours: 30
      recency-max-score: 20
      feed-window-days: 7
  retention:
    days: 90
    grace-period-days: 7
  tts:
    briefing:
      article-count: 5           # 브리핑 기사 수 (최대 10)
    scheduler:
      cron: "*/30 * * * * *"     # TTS 처리 스케줄러 주기 (30초)
    default-voice-id: "Seoyeon"
    polly:
      engine: neural
  weekly-email:
    sender: ${WEEKLY_EMAIL_SENDER:no-reply@newsift.app}
    cron: "0 0 0 * * MON"

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

cloud:
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:placeholder-bucket}
    cloudfront:
      domain: ${AWS_CLOUDFRONT_DOMAIN:https://placeholder.cloudfront.net}
