# application-local.yaml 파일을 만들어 이 값들을 채워넣으세요.
# application-local.yaml은 .gitignore에 의해 커밋되지 않습니다.
# spring.profiles.active=local|dev|prd

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/newscurator
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
  jpa:
    show-sql: true

# JWT 설정 (절대 코드/git에 하드코딩 금지)
jwt:
  secret: ${JWT_SECRET}              # 32자 이상 랜덤 시크릿
  access-ttl-seconds: 3600           # 액세스 토큰 TTL (초, 기본 1시간)
  refresh-ttl-days: 30               # 리프레시 토큰 TTL (일, 기본 30일)

# 이메일 서비스 (절대 코드/git에 하드코딩 금지)
email-service:
  base-url: ${EMAIL_SERVICE_BASE_URL}
  api-key: ${EMAIL_SERVICE_API_KEY}

# OAuth 소셜 로그인 (절대 코드/git에 하드코딩 금지)
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
  apple:
    client-id: ${APPLE_CLIENT_ID}
    client-secret: ${APPLE_CLIENT_SECRET}
    redirect-uri: ${APPLE_REDIRECT_URI}
    team-id: ${APPLE_TEAM_ID}
    key-id: ${APPLE_KEY_ID}
    private-key: ${APPLE_PRIVATE_KEY}   # PEM 형식 EC 비공개키

# Flyway Admin 시드 (절대 코드/git에 하드코딩 금지)
spring:
  flyway:
    placeholders:
      admin-email: ${ADMIN_EMAIL}
      admin-password-hash: ${ADMIN_PASSWORD_HASH}  # BCrypt 해시 (BCryptPasswordEncoder.encode)

# 외부 API 키 (절대 코드/git에 하드코딩 금지)
app:
  client:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: gemini-2.0-flash
      base-url: https://generativelanguage.googleapis.com
    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      base-url: https://openapi.naver.com

# 피드·검색 설정 (application.yaml 기본값과 동일 구조 — 필요 시 오버라이드)
  feed:
    default-page-size: 20     # 기본 페이지 크기
    max-page-size: 100        # 최대 허용 페이지 크기
    ranking:
      category-match-score: 50   # 관심 카테고리 일치 점수
      keyword-match-score: 30    # 팔로우 키워드 일치 점수
      recency-window-hours: 30   # 최신성 점수 구간 (시간)
      recency-max-score: 20      # 최신성 최대 점수
      feed-window-days: 7        # 피드 노출 기사 기간 (일)

# 데이터 보존 정책
  retention:
    days: 90                  # 기사 보존 일수
    grace-period-days: 7      # 만료 후 추가 유예 기간

# TTS 설정 (004)
  tts:
    briefing:
      article-count: 5        # 브리핑 기사 수 (최대 10)
    scheduler:
      cron: "*/30 * * * * *"  # TTS 처리 스케줄러 주기 (cron)
    # TODO(V1): NCP Clova Voice 콘솔에서 실제 speaker ID 확인 후 교체
    default-voice-id: "harin" # TODO(V1): 실제 speaker ID로 교체 필요

# Naver Clova Voice API (NCP 인증 — Naver Developers X-Naver-Client-* 와 완전히 별개)
naver:
  clova:
    voice:
      api-key-id: ${NAVER_CLOVA_VOICE_API_KEY_ID}   # NCP API Gateway Key ID
      api-key: ${NAVER_CLOVA_VOICE_API_KEY}          # NCP API Gateway Key
      base-url: https://naveropenapi.apigw.ntruss.com

# AWS S3 + CloudFront (오디오 파일 저장·배포)
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    cloudfront:
      domain: ${AWS_CLOUDFRONT_DOMAIN}               # CloudFront 배포 도메인 (https://xxx.cloudfront.net)
