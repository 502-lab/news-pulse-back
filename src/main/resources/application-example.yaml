# application-local.yaml 파일을 만들어 이 값들을 채워넣으세요.
# application-local.yaml은 .gitignore에 의해 커밋되지 않습니다.
# spring.profiles.active=local|dev|prd

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/newscurator
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
  jpa:
    show-sql: true

# JWT 설정 (절대 코드/git에 하드코딩 금지)
jwt:
  secret: ${JWT_SECRET}              # 32자 이상 랜덤 시크릿
  access-ttl-seconds: 3600           # 액세스 토큰 TTL (초, 기본 1시간)
  refresh-ttl-days: 30               # 리프레시 토큰 TTL (일, 기본 30일)

# 이메일 서비스 (절대 코드/git에 하드코딩 금지)
email-service:
  base-url: ${EMAIL_SERVICE_BASE_URL}         # https://api.resend.com
  api-key: ${EMAIL_SERVICE_API_KEY}           # Resend API 키
  from-address: ${EMAIL_FROM_ADDRESS}         # 예: NewsIT <noreply@yourdomain.com>

# OAuth 소셜 로그인 (절대 코드/git에 하드코딩 금지)
oauth:
  # 프론트엔드가 /authorize에 전달할 수 있는 redirectUri 화이트리스트
  allowed-redirect-uris:
    - http://localhost:3000
    - https://dev.newsit.app
    - https://newsit.app
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}   # provider 콘솔에 등록한 URI
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
  apple:
    client-id: ${APPLE_CLIENT_ID}
    client-secret: ${APPLE_CLIENT_SECRET}
    redirect-uri: ${APPLE_REDIRECT_URI}
    team-id: ${APPLE_TEAM_ID}
    key-id: ${APPLE_KEY_ID}
    private-key: ${APPLE_PRIVATE_KEY}   # PEM 형식 EC 비공개키

# Flyway Admin 시드 (절대 코드/git에 하드코딩 금지)
spring:
  flyway:
    placeholders:
      admin-email: ${ADMIN_EMAIL}
      admin-password-hash: ${ADMIN_PASSWORD_HASH}  # BCrypt 해시 (BCryptPasswordEncoder.encode)

# 외부 API 키 (절대 코드/git에 하드코딩 금지)
app:
  client:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: gemini-2.0-flash
      base-url: https://generativelanguage.googleapis.com
    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      base-url: https://openapi.naver.com

# 피드·검색 설정 (application.yaml 기본값과 동일 구조 — 필요 시 오버라이드)
  feed:
    default-page-size: 20     # 기본 페이지 크기
    max-page-size: 100        # 최대 허용 페이지 크기
    ranking:
      category-match-score: 50   # 관심 카테고리 일치 점수
      keyword-match-score: 30    # 팔로우 키워드 일치 점수
      recency-window-hours: 30   # 최신성 점수 구간 (시간)
      recency-max-score: 20      # 최신성 최대 점수
      feed-window-days: 7        # 피드 노출 기사 기간 (일)

# 데이터 보존 정책
  retention:
    days: 90                  # 기사 보존 일수
    grace-period-days: 7      # 만료 후 추가 유예 기간

# TTS 설정 (004)
  tts:
    briefing:
      article-count: 5        # 브리핑 기사 수 (최대 10)
    scheduler:
      cron: "*/30 * * * * *"  # TTS 처리 스케줄러 주기 (cron)
    default-voice-id: "Seoyeon"
    polly:
      engine: neural

# Firebase Admin SDK — FCM 푸시 발송 (절대 코드/git에 하드코딩 금지)
firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON}  # Base64 인코딩된 서비스 계정 JSON

# 알림 스케줄러 / 주간 이메일 (application.yaml 기본값과 동일 구조 — 필요 시 오버라이드)
  scheduler:
    bias:
      interval-ms: 60000          # 편향 분석 배치 주기 (ms)
      batch-size: 10              # 배치당 claim 건수
      recovery-interval-ms: 3600000   # one-shot 복구 폴 주기 (ms)
      backoff-attempt1-minutes: 5     # 1회 실패 후 재시도 딜레이
      backoff-attempt2-minutes: 30    # 2회 실패 후 재시도 딜레이
      lease-minutes: 5            # claim 후 PROCESSING 점유 lease (분)
    notification:
      outbox-batch-size: 50       # outbox 클레임 배치 크기
      outbox-interval-ms: 10000   # outbox 처리 주기 (ms)
      expiry-cron: "0 0 3 * * *"  # 인앱 알림 90일 만료 정리 (UTC 03:00)
  weekly-email:
    sender: ${WEEKLY_EMAIL_SENDER}  # 주간 이메일 발신자 (예: no-reply@newsift.app)
    cron: "0 0 0 * * MON"           # 매주 월요일 00:00 UTC (KST 09:00)

# AWS S3 + CloudFront (오디오 파일 저장·배포)
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    cloudfront:
      domain: ${AWS_CLOUDFRONT_DOMAIN}               # CloudFront 배포 도메인 (https://xxx.cloudfront.net)
