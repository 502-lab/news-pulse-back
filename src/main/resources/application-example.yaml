# application-local.yaml 파일을 만들어 이 값들을 채워넣으세요.
# application-local.yaml은 .gitignore에 의해 커밋되지 않습니다.
# spring.profiles.active=local|dev|prd

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/newscurator
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
  jpa:
    show-sql: true

# JWT 설정 (절대 코드/git에 하드코딩 금지)
jwt:
  secret: ${JWT_SECRET}              # 32자 이상 랜덤 시크릿
  access-ttl-seconds: 3600           # 액세스 토큰 TTL (초, 기본 1시간)
  refresh-ttl-days: 30               # 리프레시 토큰 TTL (일, 기본 30일)

# 이메일 서비스 (절대 코드/git에 하드코딩 금지)
email-service:
  base-url: ${EMAIL_SERVICE_BASE_URL}         # https://api.resend.com
  api-key: ${EMAIL_SERVICE_API_KEY}           # Resend API 키
  from-address: ${EMAIL_FROM_ADDRESS}         # 예: NewsIT <noreply@yourdomain.com>

# OAuth 소셜 로그인 (절대 코드/git에 하드코딩 금지)
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
  apple:
    client-id: ${APPLE_CLIENT_ID}
    client-secret: ${APPLE_CLIENT_SECRET}
    redirect-uri: ${APPLE_REDIRECT_URI}
    team-id: ${APPLE_TEAM_ID}
    key-id: ${APPLE_KEY_ID}
    private-key: ${APPLE_PRIVATE_KEY}   # PEM 형식 EC 비공개키

# Flyway Admin 시드 (절대 코드/git에 하드코딩 금지)
spring:
  flyway:
    placeholders:
      admin-email: ${ADMIN_EMAIL}
      admin-password-hash: ${ADMIN_PASSWORD_HASH}  # BCrypt 해시 (BCryptPasswordEncoder.encode)

# 외부 API 키 (절대 코드/git에 하드코딩 금지)
app:
  client:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: gemini-2.0-flash
      base-url: https://generativelanguage.googleapis.com
    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      base-url: https://openapi.naver.com
