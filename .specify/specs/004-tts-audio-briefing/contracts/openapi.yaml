openapi: "3.1.0"
info:
  title: news-pulse-back — 004 TTS 음성 API
  version: "0.4.1"
  description: 기사 TTS 음성 생성·재생 + 브리핑 재생 큐 API (spec 004)

servers:
  - url: /api/v1

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success: { type: boolean }
        data:    { }
        error:   { type: object, nullable: true }

    VoiceResponse:
      type: object
      properties:
        id:         { type: string, example: "[TBD]", description: "음성 ID (Naver Clova 실제 화자 ID — 콘솔 확인 필요)" }
        name:       { type: string, example: "하린", description: "표시 이름 (디자인 확정)" }
        gender:     { type: string, enum: [FEMALE, MALE] }
        previewUrl: { type: string, format: uri, description: "미리듣기 샘플 URL (CDN 정적 파일)" }

    TtsStatusResponse:
      type: object
      description: 기사 단건 TTS 작업 상태
      properties:
        id:          { type: string, format: uuid, description: "TTS 작업 ID" }
        ownerType:   { type: string, enum: [ARTICLE], description: "항상 ARTICLE" }
        refId:       { type: string, description: "articleId 문자열" }
        voiceId:     { type: string, example: "[TBD]" }
        status:      { type: string, enum: [PENDING, PROCESSING, READY, FAILED] }
        audioUrl:    { type: string, format: uri, nullable: true, description: "READY 상태에서만 값 있음 (S3 audio_key → 응답 시 URL 생성)" }
        durationSec: { type: integer, nullable: true, description: "재생 시간(초). Naver API 미제공 — MP3 메타 파싱 또는 nullable 유지." }
        errorMsg:    { type: string, nullable: true, description: "FAILED 상태 오류 메시지" }

    TtsRequest:
      type: object
      required: [voiceId]
      properties:
        voiceId: { type: string, example: "[TBD]", description: "사용할 음성 ID (voices.id)" }

    BriefingResponse:
      type: object
      description: |
        데일리 브리핑 재생 큐. 단일 합성 오디오가 아닌 기사별 TTS 상태 배열.
        "브리핑 READY" = ttsItems 전체가 READY 상태.
      properties:
        briefDate:  { type: string, format: date, example: "2026-06-13" }
        articleIds:
          type: array
          items: { type: integer, format: int64 }
          description: "재생 큐 순서 (인덱스 = 재생 순서)"
        voiceId:    { type: string, example: "[TBD]" }
        ttsItems:
          type: array
          items:
            $ref: '#/components/schemas/TtsStatusResponse'
          description: "각 기사 TTS 상태 (articleIds 순서와 동일)"

    ReadingPreferenceRequest:
      type: object
      description: |
        읽기/청취 설정 수정 요청.
        voiceId는 optional — 미전송 시 기존 값 유지.
        읽기/듣기 방식은 기존 consumeMode(READ/LISTEN/BOTH) 필드 사용.
      properties:
        summaryDepth: { type: string, enum: [BRIEF, BALANCED, DEEP] }
        consumeMode:  { type: string, enum: [READ, LISTEN, BOTH], description: "소비 방식 (읽기/듣기/둘 다) — 기존 필드" }
        voiceId:      { type: string, example: "[TBD]", nullable: true, description: "선호 음성 ID. null = app.tts.default-voice-id 설정값 사용" }

    ReadingPreferenceResponse:
      type: object
      properties:
        summaryDepth: { type: string }
        consumeMode:  { type: string, description: "소비 방식 (READ/LISTEN/BOTH)" }
        voiceId:      { type: string, nullable: true }

paths:

  # ─── US1: 음성 목록 ────────────────────────────────────────────────
  /voices:
    get:
      tags: [Voice]
      summary: 음성 목록 조회
      description: |
        사용 가능한 TTS 음성 캐릭터 목록 반환 (하린·준서).
        화자 ID는 Naver Clova Voice 콘솔 확인 후 [TBD] 대체 필요.
      responses:
        "200":
          description: 음성 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/VoiceResponse'
        "401": { description: 미인증 }
        "403": { description: 이메일 인증 미완료 }

  # ─── US1: reading_preferences 확장 (voice_id 추가, consumeMode 재사용) ──
  /me/reading-preference:
    put:
      tags: [Profile]
      summary: 청취 설정 수정 (voiceId 추가)
      description: |
        002 기존 요약 심도(summaryDepth)·소비 방식(consumeMode)에 더해 선호 음성(voiceId)을 저장.
        consumeMode(READ/LISTEN/BOTH)는 002 기존 필드 재사용 — readMode 별도 필드 없음.
        voiceId는 optional — 미전송 시 기존 값 유지.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadingPreferenceRequest'
      responses:
        "200":
          description: 업데이트된 청취 설정
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReadingPreferenceResponse'
        "401": { description: 미인증 }
        "403": { description: 이메일 인증 미완료 }
        "422": { description: 유효하지 않은 voiceId (voices 테이블에 없는 ID) }

  # ─── US2: 기사 TTS 생성 요청 ───────────────────────────────────────
  /articles/{articleId}/tts:
    post:
      tags: [TTS]
      summary: 기사 TTS 생성 요청
      description: |
        기사 요약(brief/balanced)을 지정 음성으로 TTS 변환 요청.
        멱등 분기:
        - 동일 (articleId, voiceId) READY → 200 + audioUrl 즉시 반환
        - PENDING/PROCESSING → 202 + 기존 jobId 반환 (중복 생성 없음)
        - FAILED → 기존 행 UPDATE(PENDING 리셋) → 202 반환
        - 신규 → 새 PENDING 행 생성 → 202 반환
        요약 미완료 기사는 409 반환.
      parameters:
        - name: articleId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TtsRequest'
      responses:
        "202":
          description: TTS 생성 시작 또는 FAILED 행 재시작 (PENDING)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TtsStatusResponse'
        "200":
          description: 이미 READY — 즉시 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TtsStatusResponse'
        "401": { description: 미인증 }
        "403": { description: 이메일 인증 미완료 }
        "404": { description: 기사 없음 }
        "409": { description: "기사 요약 미완료 — TTS 생성 불가 (error code: SUMMARY_NOT_READY)" }
        "422": { description: 유효하지 않은 voiceId }

    get:
      tags: [TTS]
      summary: 기사 TTS 상태 조회
      description: 기사 TTS 생성 상태 및 audioUrl 조회 (폴링용).
      parameters:
        - name: articleId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: voiceId
          in: query
          required: true
          schema: { type: string, example: "[TBD]" }
      responses:
        "200":
          description: TTS 상태
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TtsStatusResponse'
        "401": { description: 미인증 }
        "403": { description: 이메일 인증 미완료 }
        "404": { description: TTS 작업 없음 }

  # ─── US3: 데일리 브리핑 재생 큐 ────────────────────────────────────
  /briefing/today:
    get:
      tags: [Briefing]
      summary: 오늘의 브리핑 조회·생성 (재생 큐)
      description: |
        오늘 날짜(UTC 기준) 브리핑을 반환한다. 단일 합성 오디오가 아닌 기사별 TTS 상태 배열(ttsItems).

        **신규 생성** (당일 브리핑 없음):
        1. 003 개인화 피드 상위 N건 중 summary_status=COMPLETED 기사 선정
        2. 각 기사에 대해 tts_audios(ARTICLE, articleId, voiceId) 없으면 PENDING 생성
        3. DailyBrief 행 저장 → 202 반환

        **캐시 반환** (당일 브리핑 존재):
        - ttsItems 각 기사 TTS 상태 포함 → 200(전체 READY) 또는 202(일부 PENDING/PROCESSING)

        관심사 미설정 시 최신순 fallback.
      responses:
        "200":
          description: 브리핑 반환 (전체 ttsItems READY)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BriefingResponse'
        "202":
          description: 브리핑 생성 중 또는 일부 기사 TTS 아직 PENDING/PROCESSING
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BriefingResponse'
        "401": { description: 미인증 }
        "403": { description: 이메일 인증 미완료 }
        "404": { description: 오늘 피드 요약 완료 기사 0건 — 브리핑 생성 불가 }

  # ─── US4: 저장 기사 listenable 필터 ───────────────────────────────
  /me/saved-articles:
    get:
      tags: [Saved Articles]
      summary: 저장 기사 목록 (listenable 필터 확장)
      description: |
        003 기존 동작 유지. `listenable=true` 시 TTS READY 기사만 반환.
        voiceId 파라미터로 특정 음성 기준 필터 가능 (미제공 시 임의 음성 READY 포함).

        **구현 주의**: tts_audios.ref_id(VARCHAR) ↔ saved_articles.article_id(BIGINT) 캐스팅 필요.
      parameters:
        - name: cursor
          in: query
          required: false
          schema: { type: string }
        - name: size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - name: listenable
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: "true: TTS READY 기사만 반환"
        - name: voiceId
          in: query
          required: false
          schema: { type: string }
          description: "listenable=true 시 특정 음성 기준 필터 (미제공: 임의 음성)"
      responses:
        "200":
          description: 저장 기사 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        "401": { description: 미인증 }
        "403": { description: 이메일 인증 미완료 }
