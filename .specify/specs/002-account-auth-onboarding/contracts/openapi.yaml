openapi: 3.1.0
info:
  title: News Pulse — 계정·인증·온보딩·인가 API
  version: 1.0.0
  description: |
    spec 002 "계정·인증·온보딩·인가" API Contract.
    모든 시각은 UTC ISO-8601. 액세스 토큰 TTL 1h, 리프레시 토큰 TTL 30d.
    `/api/v1/admin/**` — ADMIN 역할 전용.
    `/api/v1/**` (나머지) — 인증 필수 (이메일 인증 완료 포함).
    공개 화이트리스트: 인증·비밀번호 재설정·헬스체크 엔드포인트. 이메일 인증 엔드포인트는 인증 필수(토큰 필요, emailVerified=false 허용).

servers:
  - url: http://localhost:8080
    description: 로컬 개발

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Common ──────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      description: RFC 7807 Problem Details 기반 에러 응답
      properties:
        code:
          type: string
          example: INVALID_PASSWORD
        message:
          type: string
          example: 비밀번호는 영문·숫자를 포함한 8자 이상이어야 합니다
        timestamp:
          type: string
          format: date-time
          example: '2026-06-11T10:00:00Z'
      required: [code, message, timestamp]

    TokenPair:
      type: object
      description: 인증 세션 토큰 쌍
      properties:
        accessToken:
          type: string
          description: JWT 액세스 토큰 (TTL 1h)
          example: eyJhbGciOiJIUzI1NiJ9...
        refreshToken:
          type: string
          description: 리프레시 토큰 (TTL 30d). Rotation 적용 — 사용 시 교체됨
          example: a1b2c3d4...
        expiresIn:
          type: integer
          description: 액세스 토큰 만료까지 남은 초
          example: 3600
      required: [accessToken, refreshToken, expiresIn]

    AccountSummary:
      type: object
      description: 현재 인증된 계정 요약 정보
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
          description: 소셜 전용 계정은 null 가능
        role:
          type: string
          enum: [USER, ADMIN]
        emailVerified:
          type: boolean
        onboardingCompleted:
          type: boolean
        signupType:
          type: string
          enum: [EMAIL, SOCIAL]
        createdAt:
          type: string
          format: date-time
        requiresReConsent:
          type: boolean
          description: 현재 활성 필수 약관 중 미동의 버전 존재 여부. true이면 클라이언트가 재동의 UI를 표시해야 함
      required: [id, role, emailVerified, onboardingCompleted, signupType, createdAt, requiresReConsent]

    # ── Signup / Login ───────────────────────────────────────────────────────
    SignupRequest:
      type: object
      description: 이메일 회원가입 요청
      properties:
        email:
          type: string
          format: email
          description: 가입 이메일 (대소문자 불구분 저장)
          example: user@example.com
        password:
          type: string
          description: 영문·숫자 각 1자 이상 포함, 8자 이상
          minLength: 8
          example: Password1
        consents:
          type: array
          description: 약관 동의 목록 (필수 약관 미동의 시 422)
          items:
            $ref: '#/components/schemas/ConsentInput'
        ageConfirmed:
          type: boolean
          description: 만 14세 이상 동의 여부. false이면 422
          example: true
      required: [email, password, consents, ageConfirmed]

    ConsentInput:
      type: object
      properties:
        termsVersionId:
          type: string
          format: uuid
          description: 동의할 약관 버전 ID
        agreed:
          type: boolean
      required: [termsVersionId, agreed]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    SocialCallbackRequest:
      type: object
      description: 소셜 provider 콜백 처리 요청
      properties:
        code:
          type: string
          description: provider로부터 받은 authorization code
        state:
          type: string
          description: CSRF 방지용 state 값 (백엔드가 발급한 값)
        redirectUri:
          type: string
          description: 인증 요청 시 사용한 redirect URI (provider 토큰 교환에 필요)
        consents:
          type: array
          description: 신규 가입 시 약관 동의 목록 (기존 계정 로그인 시 무시)
          items:
            $ref: '#/components/schemas/ConsentInput'
          nullable: true
        ageConfirmed:
          type: boolean
          nullable: true
          description: 신규 가입 시 연령 동의. 기존 계정 로그인 시 무시.
      required: [code, state, redirectUri]

    SocialAuthorizeResponse:
      type: object
      description: 소셜 로그인 시작 응답 (프론트엔드가 이 URL로 리다이렉트)
      properties:
        authorizationUrl:
          type: string
          description: provider 인증 페이지 URL (state 포함)
        state:
          type: string
          description: CSRF 검증용 state (프론트엔드가 콜백 시 그대로 반환해야 함)
      required: [authorizationUrl, state]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: 현재 유효한 리프레시 토큰
      required: [refreshToken]

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: 로그아웃할 세션의 리프레시 토큰 (해당 기기 세션만 무효화)
      required: [refreshToken]

    # ── Password Reset ────────────────────────────────────────────────────────
    PasswordResetRequestBody:
      type: object
      description: 비밀번호 재설정 코드 발급 요청
      properties:
        email:
          type: string
          format: email
          description: |
            가입된 이메일로 코드를 발송함. 미가입 이메일도 동일 응답(계정 열거 방지, FR-026).
      required: [email]

    PasswordResetVerifyRequest:
      type: object
      description: 비밀번호 재설정 코드 검증
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          description: 이메일로 받은 6자리 숫자 코드
          pattern: '^\d{6}$'
          example: '123456'
      required: [email, code]

    PasswordResetVerifyResponse:
      type: object
      properties:
        resetToken:
          type: string
          description: 비밀번호 변경 허가 토큰 (단일 사용, TTL 10분)
      required: [resetToken]

    PasswordResetConfirmRequest:
      type: object
      properties:
        resetToken:
          type: string
          description: PasswordResetVerifyResponse에서 받은 변경 허가 토큰
        newPassword:
          type: string
          description: 새 비밀번호 (영문·숫자 각 1자 이상, 8자 이상)
          minLength: 8
      required: [resetToken, newPassword]

    # ── Email Verification ────────────────────────────────────────────────────
    EmailVerificationRequestBody:
      type: object
      description: |
        이메일 인증 코드 발송 요청.
        가입 직후 자동 발송되며, 이 엔드포인트는 재발송 요청에 사용.
      properties:
        email:
          type: string
          format: email
          description: 인증할 이메일 (현재 계정 이메일과 일치해야 함)
      required: [email]

    EmailVerificationVerifyRequest:
      type: object
      properties:
        code:
          type: string
          pattern: '^\d{6}$'
          example: '654321'
      required: [code]

    # ── Profile / Preferences ─────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        nickname:
          type: string
          maxLength: 50
          nullable: true
        ageGroup:
          type: string
          enum: [TEENS, TWENTIES, THIRTIES, FORTIES, FIFTIES_PLUS]
          nullable: true
        occupation:
          type: string
          maxLength: 100
          nullable: true

    UserInterests:
      type: object
      properties:
        categories:
          type: array
          description: 관심 카테고리 목록. 최소 3개 유지 필수.
          items:
            type: string
            enum: [POLITICS, ECONOMY_FINANCE, ENTERTAINMENT_CULTURE, SPORTS, WORLD, SCIENCE, HEALTH_MEDICINE, AUTOMOTIVE, IT, OTHER]
          minItems: 3
      required: [categories]

    FollowKeywordsRequest:
      type: object
      properties:
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/FollowKeywordItem'
      required: [keywords]

    FollowKeywordItem:
      type: object
      properties:
        keyword:
          type: string
          maxLength: 100
        type:
          type: string
          enum: [COMPANY, THEME, PERSON]
      required: [keyword, type]

    ReadingPreference:
      type: object
      properties:
        summaryDepth:
          type: string
          enum: [BRIEF, BALANCED, DEEP]
          description: "요약 깊이 (기본값: BALANCED)"
        consumeMode:
          type: string
          enum: [READ, LISTEN, BOTH]
          description: "소비 방식 (기본값: READ)"
      required: [summaryDepth, consumeMode]

    BriefingSettings:
      type: object
      properties:
        briefingTime:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: 브리핑 시간 HH:MM (로컬 기준)
          example: '08:00'
        timezoneOffset:
          type: integer
          description: UTC 오프셋(분). KST=540, JST=540, UTC=0
          example: 540
        voiceEnabled:
          type: boolean
        pushAgreed:
          type: boolean
          description: 푸시 알림 동의. true 설정 시 동의 시각이 기록됨.
      required: [briefingTime, timezoneOffset, voiceEnabled, pushAgreed]

    OnboardingRequest:
      type: object
      description: 온보딩 전체 데이터 일괄 저장 요청
      properties:
        profile:
          $ref: '#/components/schemas/UserProfile'
        interests:
          $ref: '#/components/schemas/UserInterests'
        keywords:
          $ref: '#/components/schemas/FollowKeywordsRequest'
        readingPreference:
          $ref: '#/components/schemas/ReadingPreference'
        briefingSettings:
          $ref: '#/components/schemas/BriefingSettings'
      required: [interests]

    OnboardingStatus:
      type: object
      properties:
        completed:
          type: boolean
        interestCount:
          type: integer
          description: 현재 선택된 관심 카테고리 수
        personalizationActive:
          type: boolean
          description: 관심 카테고리 3개 이상 선택 시 true
      required: [completed, interestCount, personalizationActive]

    # ── Terms ─────────────────────────────────────────────────────────────────
    TermsVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [SERVICE, PRIVACY, MARKETING]
        version:
          type: string
          example: '1.0'
        effectiveDate:
          type: string
          format: date
          example: '2026-06-01'
        isRequired:
          type: boolean
        isActive:
          type: boolean
      required: [id, type, version, effectiveDate, isRequired, isActive]

    ConsentRecord:
      type: object
      properties:
        termsVersionId:
          type: string
          format: uuid
        type:
          type: string
          enum: [SERVICE, PRIVACY, MARKETING]
        version:
          type: string
        agreed:
          type: boolean
        agreedAt:
          type: string
          format: date-time
      required: [termsVersionId, type, version, agreed, agreedAt]

    # ── Admin ─────────────────────────────────────────────────────────────────
    CreateTermsVersionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [SERVICE, PRIVACY, MARKETING]
        version:
          type: string
          example: '2.0'
        effectiveDate:
          type: string
          format: date
        isRequired:
          type: boolean
      required: [type, version, effectiveDate, isRequired]

paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # AUTH — Public
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 이메일 회원가입
      description: |
        이메일+비밀번호로 계정을 생성한다. 필수 약관 동의 및 연령 동의 필수.
        성공 시 액세스·리프레시 토큰을 반환한다(이메일 미인증 상태로 발급).
        계정 생성 트랜잭션 커밋 후 이메일 인증 코드 발송을 시도한다.
        이메일 발송 실패 시 계정은 유지되고, verificationEmailSent=false로 반환된다(항상 201).
        사용자는 이후 /auth/email-verification/request로 재발송할 수 있다.
        503/orphan-코드/한도 정책은 requestCode(재발송) 레벨에서 유지되며, signup은 계정을 항상 보존한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: 계정 생성 완료
          content:
            application/json:
              schema:
                type: object
                required: [account, tokens, verificationEmailSent]
                properties:
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
                  verificationEmailSent:
                    type: boolean
                    description: 이메일 인증 코드 발송 성공 여부. 이메일 서비스 장애 시 false(계정은 생성됨). 재발송은 /auth/email-verification/request 이용.
        '409':
          description: 이메일 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 유효성 검사 실패 (비밀번호 정책·약관 미동의·연령 미달)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 이메일 로그인
      description: |
        이메일+비밀번호로 인증 후 토큰 쌍을 반환한다.
        연속 5회 실패 시 계정 잠금 (30분 자동 해제, FR-019).
        잘못된 자격증명·계정 미존재·계정 잠금은 동일 401로 반환해 계정 열거를 방지함 (FR-026).
        소셜 전용 계정(비밀번호 없음)에는 422(SOCIAL_ONLY_ACCOUNT)로 소셜 로그인 안내 반환 — FR-026 수용 예외.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '401':
          description: 인증 실패 (잘못된 자격증명·계정 미존재·계정 잠금 — 모두 동일 포맷으로 계정 열거 방지)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 계정 정지 (SUSPENDED 상태)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 소셜 전용 계정 — 비밀번호 미보유, 소셜 로그인 이용 안내 (code=SOCIAL_ONLY_ACCOUNT, FR-026 예외)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 액세스 토큰 갱신 (Refresh Token Rotation)
      description: |
        유효한 리프레시 토큰으로 새 토큰 쌍을 발급한다.
        기존 리프레시 토큰은 즉시 무효화된다(Rotation).
        이미 무효화된 토큰 재사용 감지 시 해당 family의 모든 세션을 무효화한다 (FR-020).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: 리프레시 토큰 만료 또는 무효화됨 (재로그인 필요)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃 (현재 세션 무효화)
      description: 전달한 리프레시 토큰에 해당하는 세션만 무효화한다. 다른 기기 세션은 유지.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: 로그아웃 성공 (본문 없음)
        '401':
          description: 미인증
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/social/{provider}/authorize:
    get:
      tags: [Auth - Social]
      summary: 소셜 로그인 인증 URL 발급
      description: |
        provider의 OAuth 인증 페이지 URL과 CSRF 방지용 state를 반환한다.
        프론트엔드는 이 URL로 사용자를 리다이렉트하고, state를 저장해 콜백 시 함께 전달한다.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [kakao, google, apple]
          description: 소셜 provider 식별자
        - name: redirectUri
          in: query
          required: true
          schema:
            type: string
          description: OAuth 콜백 후 돌아올 클라이언트 URI
      responses:
        '200':
          description: 인증 URL 발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialAuthorizeResponse'
        '400':
          description: 지원하지 않는 provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/social/{provider}/callback:
    post:
      tags: [Auth - Social]
      summary: 소셜 로그인 콜백 처리 (가입 또는 로그인)
      description: |
        provider로부터 받은 code와 state를 검증한 후 가입 또는 로그인을 처리한다.
        state 검증 실패 시 400 반환 (FR-027).
        신규 가입 시 consents, ageConfirmed 필수.
        기존 계정 로그인 시 consents/ageConfirmed 무시.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [kakao, google, apple]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialCallbackRequest'
      responses:
        '200':
          description: 로그인 성공 (기존 계정)
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '201':
          description: 가입 및 로그인 성공 (신규 계정)
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/AccountSummary'
                  tokens:
                    $ref: '#/components/schemas/TokenPair'
        '400':
          description: state 검증 실패 (CSRF 의심)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 동일 이메일로 이메일 계정 이미 존재 (FR-007)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 신규 가입 시 약관 미동의 또는 연령 미달
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # PASSWORD RESET — Public
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/auth/password-reset/request:
    post:
      tags: [Auth - Password Reset]
      summary: 비밀번호 재설정 코드 발급 (1단계)
      description: |
        등록·미등록·소셜 전용 계정 이메일 모두 동일하게 202를 반환한다 (계정 열거 방지, FR-026).
        이메일 서비스 장애 시 503 반환, 한도 미차감 (FR-011).
        시간당 5회 초과 시 429 반환 (FR-011).
        소셜 전용 계정 이메일로 요청 시 HTTP 응답은 동일 202이지만, 내부적으로 "비밀번호 재설정 불가 — 소셜 로그인 이용" 안내 이메일을 발송한다 (코드는 생성하지 않음).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '202':
          description: 처리 완료 (등록·미등록·소셜 전용 계정 모두 동일 202 — 계정 존재 여부 누설 없음)
        '429':
          description: 재전송 횟수 초과 (시간당 5회)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 이메일 서비스 장애
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/password-reset/verify:
    post:
      tags: [Auth - Password Reset]
      summary: 비밀번호 재설정 코드 검증 (2단계)
      description: |
        이메일로 받은 6자리 코드를 검증한다.
        성공 시 단일 사용 변경 허가 토큰(TTL 10분)을 반환한다.
        코드 만료 시 410, 오입력 401(시도 횟수 증가), 5회 초과 시 코드 무효화.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetVerifyRequest'
      responses:
        '200':
          description: 코드 검증 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetVerifyResponse'
        '401':
          description: 잘못된 코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: 코드 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/password-reset/confirm:
    post:
      tags: [Auth - Password Reset]
      summary: 새 비밀번호 설정 (3단계)
      description: |
        변경 허가 토큰과 새 비밀번호로 비밀번호를 재설정한다.
        성공 시 해당 계정의 모든 리프레시 토큰을 즉시 무효화한다 (FR-025).
        변경 허가 토큰은 단일 사용 — 재사용 시 401.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '204':
          description: 비밀번호 변경 완료 (본문 없음)
        '401':
          description: 변경 허가 토큰 무효·만료·재사용 시도
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 비밀번호 정책 미충족
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # EMAIL VERIFICATION — Authenticated (email-unverified accounts allowed)
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/auth/email-verification/request:
    post:
      tags: [Auth - Email Verification]
      summary: 이메일 인증 코드 재발송
      description: |
        가입 이메일로 인증 코드를 재발송한다. 기존 미사용 코드는 즉시 무효화.
        시간당 5회 초과 시 429. 이미 인증된 계정에서 호출 시 422.
        이메일 서비스 장애 시 503, 한도 미차감.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequestBody'
      responses:
        '202':
          description: 코드 발송 처리 완료
        '422':
          description: 이미 인증 완료된 계정
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 재전송 횟수 초과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 이메일 서비스 장애
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/email-verification/verify:
    post:
      tags: [Auth - Email Verification]
      summary: 이메일 인증 코드 검증
      description: |
        이메일로 받은 6자리 코드를 검증하고 계정을 '인증' 상태로 전환한다.
        코드 만료 시 410, 오입력 5회 초과 시 코드 무효화.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationVerifyRequest'
      responses:
        '200':
          description: 이메일 인증 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailVerified:
                    type: boolean
                    example: true
        '401':
          description: 잘못된 코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: 코드 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # ME — Authenticated + Email Verified
  # ═══════════════════════════════════════════════════════════════════════════
  /api/v1/me:
    get:
      tags: [Me]
      summary: 내 계정 요약 조회
      description: |
        현재 인증된 계정의 기본 정보를 반환한다.
        이메일 인증이 완료된 계정만 접근 가능 (emailVerified=true 필수).
        미인증 계정은 403(code=EMAIL_NOT_VERIFIED) 반환.
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSummary'
        '401':
          description: 미인증 (토큰 없음 또는 유효하지 않음)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 이메일 미인증 (code=EMAIL_NOT_VERIFIED). 이메일 인증 완료 후 재로그인하여 새 토큰 발급 필요.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

