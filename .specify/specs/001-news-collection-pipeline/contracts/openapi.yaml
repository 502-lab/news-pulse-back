openapi: 3.1.0
info:
  title: Newsift - News Feed API
  version: 1.0.0
  description: |
    카테고리 피드 조회 및 기사 상세 API. 관리자 파이프라인 통계 API 포함.

    **인증**: Bearer JWT (Authorization 헤더). 인증 구현은 spec 002.
    현재 모든 엔드포인트는 인증 미구현 상태로 배포 가능하나,
    admin 엔드포인트는 향후 ROLE_ADMIN 보호를 위해 분리된 경로(/api/v1/admin/*)를 사용한다.

    **커서 페이지네이션**: `nextCursor` 토큰을 다음 요청의 `cursor` 파라미터로 전달.
    커서는 `published_at + id`를 Base64 인코딩한 불투명 토큰이다.

    **에러 응답**: 모든 에러는 아래 ErrorResponse 형식을 따른다.

servers:
  - url: https://api.newsift.io/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: feed
    description: 카테고리 피드 조회
  - name: articles
    description: 기사 상세 조회
  - name: admin
    description: 관리자 파이프라인 통계 (ROLE_ADMIN 필요)

paths:

  /articles:
    get:
      tags: [feed]
      summary: 카테고리 피드 목록 조회
      operationId: getFeed
      description: |
        인증된 사용자가 최신순 뉴스 목록을 커서 기반으로 조회한다.

        **노출 조건**: `category_status ∈ {COMPLETED, FAILED}` AND `feed_visible = true`.
        PENDING 기사는 제외된다.
        `category_status = FAILED` 기사는 `category = OTHER`로 반환된다.

        **정렬**: `published_at DESC, id DESC` (안정 정렬을 위해 id를 tie-breaker로 사용).

        **페이지 크기**: 기본 20, 최대 100. 초과 요청은 100으로 clamp.
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: 이전 응답의 nextCursor 토큰. 첫 페이지 요청 시 생략.
          example: "eyJwdWJsaXNoZWRBdCI6IjIwMjYtMDYtMDlUMTI6MDA6MDBaIiwiaWQiOjEyM30"
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: 페이지당 기사 수. 100 초과 요청은 100으로 clamp.
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Category'
          description: 카테고리 필터. 생략 시 전체 카테고리. 정의된 enum 외 값은 400 VALIDATION_ERROR로 응답한다.
      responses:
        '200':
          description: 피드 목록 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleFeedResponse'
              examples:
                normalFeed:
                  summary: 피드 목록 (일반)
                  value:
                    data:
                      - id: 123
                        title: "반도체 수출 급증, 3분기 무역수지 흑자 전환"
                        category: ECONOMY_FINANCE
                        categoryStatus: COMPLETED
                        primarySource: "연합뉴스"
                        publishedAt: "2026-06-09T10:30:00Z"
                        preview: "산업통상자원부에 따르면 6월 반도체 수출이 전년 동기 대비 42% 증가..."
                        summaryStatus: COMPLETED
                    nextCursor: "eyJwdWJsaXNoZWRBdCI6IjIwMjYtMDYtMDlUMTA6MzA6MDBaIiwiaWQiOjEyM30"
                    hasMore: true
                    size: 20
                emptyFeed:
                  summary: 결과 없음 (0건)
                  value:
                    data: []
                    nextCursor: null
                    hasMore: false
                    size: 0
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /articles/{id}:
    get:
      tags: [articles]
      summary: 기사 상세 조회
      operationId: getArticle
      description: |
        기사 ID로 상세 정보와 세 가지 깊이의 요약 슬롯을 반환한다.

        **요약 슬롯 생성**:
        - BALANCED: eager 생성 (AI 처리 파이프라인에서 수집 직후 생성)
        - BRIEF: BALANCED 트런케이션으로 즉시 생성 (별도 AI 호출 없음)
        - DEEP: 최초 상세 조회 시 동기 AI 생성 후 캐시. 첫 요청은 응답이 느릴 수 있음.

        **슬롯 상태**: NOT_GENERATED / PENDING / COMPLETED / FAILED
        - COMPLETED: content 필드에 본문 포함
        - FAILED: content=null. 다음 상세 조회 시 재시도 가능 (영구 차단 아님, 백오프 적용)
        - NOT_GENERATED: 아직 생성 요청 없음 (DEEP 슬롯 초기 상태)

        **DEEP 슬롯 실패 동작**: 기사가 존재하면 항상 200을 반환한다.
        DEEP 생성 중 AI 오류 발생 시 `summaries.deep.status=FAILED` (content=null)로 응답하며,
        다음 상세 조회 시 백오프 후 재시도한다 (retry_limit과 무관하게 매 요청마다 시도).

        **category_status = FAILED**: `category` 필드를 `OTHER`로 반환.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 기사 ID
      responses:
        '200':
          description: 기사 상세 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetailResponse'
              example:
                id: 123
                title: "반도체 수출 급증, 3분기 무역수지 흑자 전환"
                author: "홍길동 기자"
                category: ECONOMY_FINANCE
                categoryStatus: COMPLETED
                publishedAt: "2026-06-09T10:30:00Z"
                collectedAt: "2026-06-09T10:32:15Z"
                originalUrl: "https://www.yna.co.kr/view/AKR20260609001"
                sources:
                  - name: "연합뉴스"
                    collectedAt: "2026-06-09T10:32:15Z"
                  - name: "YTN"
                    collectedAt: "2026-06-09T10:45:00Z"
                summaries:
                  brief:
                    status: COMPLETED
                    content: "산업통상자원부에 따르면 6월 반도체 수출이..."
                    generatedAt: "2026-06-09T10:33:00Z"
                  balanced:
                    status: COMPLETED
                    content: "산업통상자원부에 따르면 6월 반도체 수출이 전년 동기 대비 42% 증가해..."
                    generatedAt: "2026-06-09T10:33:00Z"
                  deep:
                    status: NOT_GENERATED
                    content: null
                    generatedAt: null
                aiDisclaimer: "이 요약은 AI가 생성한 참고 정보입니다. 정확성을 보장하지 않으며 원문 확인을 권장합니다."
                expiresAt: "2026-09-07T10:32:15Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/pipeline/stats:
    get:
      tags: [admin]
      summary: 파이프라인 통계 조회
      operationId: getPipelineStats
      description: |
        관리자가 오늘의 수집·처리 현황을 단일 API 호출로 확인한다.

        **접근 제한**: ROLE_ADMIN (spec 002 인증 구현 후 적용).
        현재는 경로 분리(/api/v1/admin/*)로 향후 보호를 준비한다.

        통계는 실시간 DB 집계 쿼리로 산출한다 (캐시 없음).
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 파이프라인 통계 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStatsResponse'
              example:
                date: "2026-06-09"
                articlesCollectedToday: 342
                summaryCompletionRate: 87.4
                mergeCount: 28
                categoryBreakdown:
                  ECONOMY_FINANCE: 89
                  IT: 67
                  POLITICS: 54
                  WORLD: 42
                  SPORTS: 38
                  SCIENCE: 21
                  ENTERTAINMENT_CULTURE: 15
                  HEALTH_MEDICINE: 9
                  AUTOMOTIVE: 7
                  OTHER: 0
                pipelineStatus:
                  categoryPending: 12
                  categoryFailed: 3
                  summaryPending: 18
                  summaryFailed: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Category:
      type: string
      enum:
        - ECONOMY_FINANCE
        - SCIENCE
        - POLITICS
        - SPORTS
        - WORLD
        - ENTERTAINMENT_CULTURE
        - HEALTH_MEDICINE
        - AUTOMOTIVE
        - IT
        - OTHER
      description: |
        기사 카테고리. 표시명:
        ECONOMY_FINANCE=경제·금융, SCIENCE=과학, POLITICS=정치, SPORTS=스포츠,
        WORLD=세계, ENTERTAINMENT_CULTURE=연예·문화, HEALTH_MEDICINE=건강·의학,
        AUTOMOTIVE=자동차, IT=IT, OTHER=기타.
        AI 분류 결과가 이 enum에 정의되지 않은 값이면 OTHER로 폴백한다 (CHK013).

    ProcessingStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED]

    SummarySlotStatus:
      type: string
      enum: [NOT_GENERATED, PENDING, COMPLETED, FAILED]

    ArticleFeedItem:
      type: object
      required: [id, title, category, categoryStatus, primarySource, publishedAt, summaryStatus]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        category:
          $ref: '#/components/schemas/Category'
          description: "category_status=FAILED인 경우 OTHER로 반환"
        categoryStatus:
          $ref: '#/components/schemas/ProcessingStatus'
        primarySource:
          type: string
          description: "첫 번째 수집 출처명"
        publishedAt:
          type: string
          format: date-time
          description: "원 출처 발행 시각 (UTC)"
        preview:
          type: string
          nullable: true
          description: "balanced 요약 미리보기 (목록용). summary_status=PENDING/FAILED 시 null."
        summaryStatus:
          $ref: '#/components/schemas/ProcessingStatus'

    ArticleFeedResponse:
      type: object
      required: [data, hasMore, size]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ArticleFeedItem'
        nextCursor:
          type: string
          nullable: true
          description: "다음 페이지 커서 토큰. 마지막 페이지면 null."
        hasMore:
          type: boolean
        size:
          type: integer
          description: "실제 반환된 기사 수"

    SummarySlot:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/SummarySlotStatus'
        content:
          type: string
          nullable: true
          description: "status=COMPLETED 시에만 존재"
        generatedAt:
          type: string
          format: date-time
          nullable: true
          description: "status=COMPLETED 시에만 존재 (UTC)"

    ArticleSourceRef:
      type: object
      required: [name, collectedAt]
      properties:
        name:
          type: string
          description: "출처명"
        collectedAt:
          type: string
          format: date-time
          description: "해당 출처에서 수집한 시각 (UTC)"

    ArticleDetailResponse:
      type: object
      required: [id, title, category, categoryStatus, publishedAt, collectedAt, originalUrl, sources, summaries, aiDisclaimer]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        author:
          type: string
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
          description: "category_status=FAILED인 경우 OTHER로 반환"
        categoryStatus:
          $ref: '#/components/schemas/ProcessingStatus'
        publishedAt:
          type: string
          format: date-time
          description: "원 출처 발행 시각 (UTC)"
        collectedAt:
          type: string
          format: date-time
          description: "최초 수집 시각 (UTC)"
        originalUrl:
          type: string
          format: uri
          description: "원문 링크"
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ArticleSourceRef'
          description: "이 기사를 수집한 출처 목록 (provenance)"
        summaries:
          type: object
          required: [brief, balanced, deep]
          properties:
            brief:
              $ref: '#/components/schemas/SummarySlot'
            balanced:
              $ref: '#/components/schemas/SummarySlot'
            deep:
              $ref: '#/components/schemas/SummarySlot'
        aiDisclaimer:
          type: string
          description: "AI 생성 요약 면책 안내 문구"
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: "기사 만료 예정 시각 (UTC)"

    PipelineStatsResponse:
      type: object
      required: [date, articlesCollectedToday, summaryCompletionRate, mergeCount, categoryBreakdown, pipelineStatus]
      properties:
        date:
          type: string
          format: date
          description: "통계 기준일 (오늘, UTC)"
        articlesCollectedToday:
          type: integer
          description: "오늘 신규 수집된 기사 수"
        summaryCompletionRate:
          type: number
          format: float
          description: "오늘 수집 기사 중 summary_status=COMPLETED 비율 (%)"
        mergeCount:
          type: integer
          description: "오늘 병합 처리된 건수 (is_merge=true)"
        categoryBreakdown:
          type: object
          additionalProperties:
            type: integer
          description: |
            노출 기사(category_status∈{COMPLETED,FAILED}) 기준 카테고리별 건수.
            category_status=FAILED 기사는 OTHER로 계산한다.
            PENDING(분류 대기 중) 기사는 breakdown에서 제외되며, pipelineStatus.categoryPending에서 별도 확인 가능.
        pipelineStatus:
          type: object
          required: [categoryPending, categoryFailed, summaryPending, summaryFailed]
          properties:
            categoryPending:
              type: integer
              description: "분류 대기 중인 기사 수 (피드 미노출). categoryBreakdown에 미포함."
            categoryFailed:
              type: integer
              description: "분류 영구 실패 기사 수 (retry_limit 도달). 피드에서는 OTHER로 노출됨."
            summaryPending:
              type: integer
              description: "요약 대기 중인 기사 수"
            summaryFailed:
              type: integer
              description: "요약 영구 실패 기사 수 (retry_limit 도달)"

    ErrorResponse:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: string
          description: |
            애플리케이션 에러 코드. 정의된 코드 목록:
            - `ARTICLE_NOT_FOUND`: 기사 ID 없음 (404)
            - `VALIDATION_ERROR`: 파라미터 형식·범위 오류 (400). category 유효하지 않은 값, size 범위 초과 등 포함.
            - `UNAUTHORIZED`: 인증 토큰 없음 또는 만료 (401)
            - `FORBIDDEN`: 권한 없음, admin 전용 엔드포인트 (403)

            **DEEP 요약 AI 생성 실패는 에러 응답이 아니다.** 기사가 존재하면 항상 200을 반환하며, AI 오류는 `summaries.deep.status=FAILED`(content=null)로 표현된다.
          example: "ARTICLE_NOT_FOUND"
        message:
          type: string
          description: "사람이 읽을 수 있는 에러 설명"
          example: "Article with id 999 not found"
        timestamp:
          type: string
          format: date-time
          description: "에러 발생 시각 (UTC)"
          example: "2026-06-09T10:30:00Z"
        details:
          type: array
          nullable: true
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
          description: "Bean Validation 실패 등 상세 오류 목록"

  responses:
    BadRequest:
      description: 잘못된 요청 (파라미터 오류 등)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "VALIDATION_ERROR"
            message: "Invalid request parameters"
            timestamp: "2026-06-09T10:30:00Z"
            details:
              - field: "size"
                reason: "must be between 1 and 100"

    Unauthorized:
      description: 인증 토큰 없음 또는 만료
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "UNAUTHORIZED"
            message: "Authentication required"
            timestamp: "2026-06-09T10:30:00Z"

    Forbidden:
      description: 권한 없음 (관리자 전용 엔드포인트)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "FORBIDDEN"
            message: "Admin role required"
            timestamp: "2026-06-09T10:30:00Z"

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "ARTICLE_NOT_FOUND"
            message: "Article with id 999 not found"
            timestamp: "2026-06-09T10:30:00Z"
